name: Sincronizare produse
on:
  push:
    paths:
      - 'data/produse.json'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Ruleaza sincronizarea
        run: python sync.py
      - name: Commit modificarile
        run: |
          git config user.name "rixair-sync-bot"
          git config user.email "office@rixar.ro"
          git add -A
          git diff --cached --quiet || git commit -m "sync automat: preturi/stoc din produse.json [skip ci]"
          git push
