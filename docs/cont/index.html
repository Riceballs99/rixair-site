<!DOCTYPE html><html lang="ro"><head><meta charset="utf-8"><meta name="robots" content="noindex">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Contul meu | RIXAIR</title>
<link href="https://fonts.googleapis.com/css2?family=Signika:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Signika',sans-serif;background:#fff;color:#333}
.top{padding:14px 28px;border-bottom:1px solid #eee}.top img{height:64px}
.wrap{max-width:760px;margin:0 auto;padding:34px 20px 60px}
h1{font-size:28px;margin-bottom:18px}h2{font-size:20px;margin:26px 0 12px}
label{display:block;font-size:13.5px;font-weight:600;margin:12px 0 5px}
input{width:100%;font-family:inherit;font-size:15px;padding:11px 14px;border:1px solid #ddd;border-radius:10px}
button{font-family:inherit;font-size:15px;font-weight:700;border:none;border-radius:24px;padding:13px 30px;cursor:pointer;margin-top:16px}
.b1{background:#1583ab;color:#fff}.b2{background:#fff;color:#1583ab;border:2px solid #1583ab;margin-left:10px}
.muted{color:#789;font-size:13.5px;margin-top:10px}
.msg{margin-top:14px;font-size:14px;padding:11px 14px;border-radius:10px;display:none}
.msg.ok{background:#e8f5e9;color:#2e7d32;display:block}.msg.err{background:#ffebee;color:#c62828;display:block}
table{width:100%;border-collapse:collapse;font-size:14.5px;margin-top:12px}
th{background:#f5fafd;text-align:left;padding:11px;font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:#456}
td{padding:13px 11px;border-bottom:1px solid #eef2f6;vertical-align:top}
.tag{display:inline-block;background:#e8f5e9;color:#2e7d32;border-radius:12px;padding:2px 11px;font-size:12.5px;font-weight:700}
a{color:#1583ab}
</style></head><body>
<div class="top"><a href="/"><img src="/poze-rx/rixair-logo.svg" alt="RIXAIR"></a></div>
<div class="wrap">
<div id="authBox">
 <h1>Contul meu</h1>
 <label>Email</label><input id="em" type="email" placeholder="emailul tău">
 <label>Parolă</label><input id="pw" type="password" placeholder="parola">
 <div>
  <button class="b1" id="bLogin">Intră în cont</button>
  <button class="b2" id="bReg">Creează cont</button>
 </div>
 <p class="muted"><a href="#" id="bForgot">Am uitat parola</a></p>
 <div class="msg" id="m1"></div>
</div>
<div id="resetBox" style="display:none">
 <h1>Setează o parolă nouă</h1>
 <label>Parola nouă</label><input id="npw" type="password" placeholder="minim 6 caractere">
 <button class="b1" id="bSetPw">Salvează parola</button>
 <div class="msg" id="m2"></div>
</div>
<div id="acctBox" style="display:none">
 <h1>Bună, <span id="who"></span> 👋</h1>
 <p class="muted">Emailul contului: <b id="who2"></b> · <a href="#" id="bOut">Ieși din cont</a></p>
 <h2>Comenzile mele</h2>
 <div id="orders">Se încarcă...</div>
 <p class="muted">Comenzile plătite cu acest email apar aici automat.</p>
 <button class="b1" onclick="location.href='/'">Mergi la magazin</button>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var sb = window.supabase.createClient('https://uyynocwfvwmgttckgvzu.supabase.co','sb_publishable_psRLYjPPsD3pkDfpLpZfAw_ubdHcm-P');
var $=function(id){return document.getElementById(id)};
function msg(t,ok){var m=$('m1');m.textContent=t;m.className='msg '+(ok?'ok':'err');}
function fmtL(n){return n==null?'la cerere':new Intl.NumberFormat('ro-RO',{minimumFractionDigits:2}).format(n)+' Lei';}
async function refresh(){
 var s=(await sb.auth.getSession()).data.session;
 if(!s){$('authBox').style.display='';$('acctBox').style.display='none';localStorage.removeItem('rx_email');return;}
 localStorage.setItem('rx_email', s.user.email);
 $('authBox').style.display='none';$('acctBox').style.display='';
 $('who').textContent=(s.user.email||'').split('@')[0];$('who2').textContent=s.user.email;
 var r=await sb.from('comenzi').select('numar,created_at,produse,total,status').order('created_at',{ascending:false});
 var host=$('orders');
 if(r.error){host.textContent='Nu am putut încărca comenzile.';return;}
 if(!r.data.length){host.innerHTML='<p class="muted">Nicio comandă încă. <a href="/">Vezi produsele</a>.</p>';return;}
 var t='<table><tr><th>Nr</th><th>Data</th><th>Produse</th><th>Total</th><th>Status</th></tr>';
 r.data.forEach(function(c){
  var prods=(c.produse||[]).map(function(p){return (p.cantitate>1?p.cantitate+' × ':'')+(p.descriere||'');}).join('<br>');
  t+='<tr><td>#'+c.numar+'</td><td>'+new Date(c.created_at).toLocaleDateString('ro-RO')+'</td><td>'+prods+'</td><td><b>'+fmtL(c.total)+'</b></td><td><span class="tag">'+c.status+'</span></td></tr>';
 });
 host.innerHTML=t+'</table>';
}
$('bLogin').onclick=async function(){
 var r=await sb.auth.signInWithPassword({email:$('em').value.trim(),password:$('pw').value});
 if(r.error)msg('Nu am putut intra: '+(r.error.message==='Invalid login credentials'?'email sau parolă greșite':r.error.message),0);else refresh();
};
$('bReg').onclick=async function(){
 var r=await sb.auth.signUp({email:$('em').value.trim(),password:$('pw').value});
 if(r.error)msg('Eroare: '+r.error.message,0);
 else if(r.data.user&&!r.data.session)msg('Cont creat! Verifică emailul pentru confirmarea contului.',1);
 else {msg('Cont creat! Ești logat.',1); refresh();}
};
$('bForgot').onclick=async function(e){e.preventDefault();
 var em=$('em').value.trim(); if(!em){msg('Scrie întâi emailul în câmpul de sus.',0);return;}
 var r=await sb.auth.resetPasswordForEmail(em,{redirectTo:location.origin+'/cont/'});
 msg(r.error?('Eroare: '+r.error.message):'Ți-am trimis email cu linkul de resetare.',!r.error);
};
document.addEventListener('click',function(e){if(e.target.id==='bOut'){e.preventDefault();sb.auth.signOut().then(refresh);}});
sb.auth.onAuthStateChange(function(ev){
 if(ev==='PASSWORD_RECOVERY'){
  document.getElementById('authBox').style.display='none';
  document.getElementById('acctBox').style.display='none';
  document.getElementById('resetBox').style.display='';
 }
});
document.getElementById('bSetPw').onclick=async function(){
 var r=await sb.auth.updateUser({password:document.getElementById('npw').value});
 var m=document.getElementById('m2');
 if(r.error){m.textContent='Eroare: '+r.error.message;m.className='msg err';}
 else{m.textContent='Parola a fost schimbată! Te ducem la contul tău...';m.className='msg ok';
  setTimeout(function(){document.getElementById('resetBox').style.display='none';refresh();},1200);}
};
refresh();
</script></body></html>
